<!DOCTYPE html>
<html>
<head>
    <title>BLS Demo</title>

    <style>
        body {
            font-family: Arial; 
            margin: 40px auto;
        }

        textarea {
            width: 100%;
            height: 400px;
            font-family: monospace;
        }

        pre {
            background: #f4f4f4;
            padding: 16px;
            overflow: auto;
        }

        button {
            padding: 12px 20px;
        }

        .settings {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-bottom: 20px;
    }

    .settings label {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .settings input {
        padding: 8px;
    }       
    
    
    .layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
}

.sidebar {
    width: 320px;
    flex-shrink: 0;
}

.main {
    flex: 1;
}

.settings {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.settings label {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.settings input {
    padding: 8px;
    box-sizing: border-box;
}

.settings button {
    margin-top: 8px;
}
    </style>
</head>
<body>

<h1 style="width:100%;text-align: center;" >BLS Playground</h1> 

<div class="layout">

    <div class="sidebar">

        <h2>Connection Settings</h2>

        <div class="settings">
            <label>
                URL
                <input type="text" id="url" placeholder="https://yourbls.avionworx.aero">
            </label>
        
            <label>
                Environment
                <input type="text" id="env" placeholder="YourEnv">
            </label>
        
            <label>
                Blueprint
                <input type="text" id="blueprint" placeholder="master">
            </label>
        
            <label>
                API Key
                <input type="password" id="apiKey" placeholder="your api key">
            </label>
        
            <label>
                Email
                <input type="email" id="email" placeholder="your@email.com">
            </label>
        
            <button type="button" onclick="saveSettings()">
                Save Settings (unsecure)
            </button>
        
            <button type="button" onclick="clearSettings()">
                Clear Settings
            </button>
        </div>
        

    </div>

    <div class="main">

        <textarea id="payload">

        <br><br>

 
        <button onclick="runDemo()">
            Evaluate
        </button>


        <h2>Response</h2>

        <pre id="result"></pre>

    </div>
    <div class="sidebar">

        <h2>Evaluation Settings</h2>

        <div class="settings">

            <label>
                Labels
                <input type="text" id="labels" placeholder="BLH,FDP">
            </label>
        
        </div>
        

    </div>
</div>

<script>

async function runDemo() {

    try {

        const url =
        document.getElementById("url").value.trim();

        const env =
        document.getElementById("env").value.trim();

        const blueprint =
        document.getElementById("blueprint").value.trim() || "master";

        const apiKey =
        document.getElementById("apiKey").value.trim();

        const email =
        document.getElementById("email").value.trim();

        document.getElementById("result").textContent =
            "Authenticating...";

        const authResponse =
            await fetch(
                `${url}/${env}/login?email=${email}`,
                {
                    method: "POST",
                    headers: {
                        "X-API-KEY": apiKey
                    }
                });

        const jwt =
            await authResponse.text();

        document.getElementById("result").textContent =
            "Authenticated. Running evaluation...";

        const payload =
            document.getElementById("payload").value;

        let lbls = document.getElementById("labels").value.trim() || 'BLH,FDP';
        lbls = (lbls.split(",").map((item, i) => `label=${item}`)).join("&")

        const response =
            await fetch(
                `${url}/${env}/${blueprint}/evaluate?${lbls}`,
                {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${jwt}`,
                        "Content-Type": "application/json"
                    },
                    body: payload
                });

        const json =
            await response.json();

        document.getElementById("result").textContent =
            JSON.stringify(json, null, 2);

    }
    catch (err) {

        document.getElementById("result").textContent =
            err.toString();
    }
}

function loadSettings() {
    document.getElementById("url").value =
        localStorage.getItem("bls_url") || "";

    document.getElementById("env").value =
        localStorage.getItem("bls_env") || "";

    document.getElementById("blueprint").value =
        localStorage.getItem("bls_blueprint");

    document.getElementById("apiKey").value =
        localStorage.getItem("bls_apiKey") || "";

    document.getElementById("email").value =
        localStorage.getItem("bls_email") || "";
}

function saveSettings() {
    localStorage.setItem(
        "bls_url",
        document.getElementById("url").value);

    localStorage.setItem(
        "bls_env",
        document.getElementById("env").value);

    localStorage.setItem(
        "bls_blueprint",
        document.getElementById("blueprint").value);

    localStorage.setItem(
        "bls_apiKey",
        document.getElementById("apiKey").value);

    localStorage.setItem(
        "bls_email",
        document.getElementById("email").value);
 
}

function clearSettings() {
    localStorage.removeItem("bls_url");
    localStorage.removeItem("bls_env");
    localStorage.removeItem("bls_blueprint");
    localStorage.removeItem("bls_apiKey");
    localStorage.removeItem("bls_email");

    loadSettings();
}

window.addEventListener("load", loadSettings);
 
</script>

</body>
