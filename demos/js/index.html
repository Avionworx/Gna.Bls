<!DOCTYPE html>
<html>
<head>
    <title>BLS Demo</title>

    <style>
        body {
            font-family: Arial; 
            margin: 40px auto;
        }

        textarea {
            width: 100%;
            height: 400px;
            font-family: monospace;
        }

        pre {
            background: #f4f4f4;
            padding: 16px;
            overflow: auto;
        }

        button {
            padding: 12px 20px;
        }

        .settings {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-bottom: 20px;
    }

    .settings label {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .settings input {
        padding: 8px;
    }       
    
    
    .layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
}

.sidebar {
    width: 320px;
    flex-shrink: 0;
}

.main {
    flex: 1;
}

.settings {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.settings label {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.settings input {
    padding: 8px;
    box-sizing: border-box;
}

.settings button {
    margin-top: 8px;
}
    </style>
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<script type="module" src="index.js"></script> 
</head>
<body>

<h1 style="width:100%;text-align: center;" >BLS Playground</h1> 

<div class="layout">

    <div class="sidebar">

        <h2>Connection Settings</h2>

        <div class="settings">
            <label>
                URL
                <input type="text" id="url" placeholder="https://yourbls.avionworx.aero">
            </label>
        
            <label>
                Environment
                <input type="text" id="env" placeholder="YourEnv">
            </label>
        
            <label>
                Blueprint
                <input type="text" id="blueprint" placeholder="master">
            </label>
        
            <label>
                API Key
                <input type="password" id="apiKey" placeholder="your api key">
            </label>
        
            <label>
                Email
                <input type="email" id="email" placeholder="your@email.com">
            </label>
        
            <button type="button" id="saveSettingsBtn">
                Save Settings (unsecure)
            </button>
        
            <button type="button" id="clearSettingsBtn">
                Clear Settings
            </button>
        </div>
        

    </div>

    <div class="main">

        <label for="acceptSelect">Response format</label>
